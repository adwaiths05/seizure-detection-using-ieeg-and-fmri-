
services:
  soz-api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./saved_models:/app/saved_models:ro   # mount trained model files
      - ./logs:/app/logs
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
